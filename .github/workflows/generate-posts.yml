name: Generate Daily Posts

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate post with ChatGPT
        env:
         GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-post.js

      - name: Commit and push new post
        run: |
          git config user.name "PromptNova Bot"
          git config user.email "bot@promptnova.com"
          git add posts/ posts/index.json index.html sitemap.xml
          git diff --cached --quiet || git commit -m "✨ Auto-post: $(date +'%Y-%m-%d %H:%M')"
          git push
